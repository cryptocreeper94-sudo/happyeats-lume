# Render Blueprint — HappyEats Lume
# First production Lume-native application — deployed at happyeats.tlid.io
# Database: shares TLDriverConnect PostgreSQL instance (DATABASE_URL in Render dashboard)
services:
  - type: web
    name: happyeats-lume
    runtime: node
    region: ohio
    plan: starter
    branch: main
    repo: https://github.com/cryptocreeper94-sudo/happyeats-lume
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: APP_URL
        value: https://happyeats.tlid.io
      - key: APP_DOMAIN
        value: happyeats.tlid.io
      # DATABASE_URL — set in Render dashboard (shared TLDriverConnect PostgreSQL)
      # HE_JWT_SECRET  — set in Render dashboard
      # OPENAI_API_KEY — set in Render dashboard
      # STRIPE_SECRET_KEY — set in Render dashboard
      # RESEND_API_KEY — set in Render dashboard
